<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QR 編碼器</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcode-generator/1.4.4/qrcode.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0f; --surface: #13131a; --border: #2a2a38;
      --accent: #7fff6e; --accent2: #3dffd0; --text: #e8e8f0;
      --muted: #5a5a72; --glow: rgba(127,255,110,0.18);
    }
    html,body { height:100%; background:var(--bg); color:var(--text); font-family:'Noto Sans TC',sans-serif; }
    body {
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      min-height:100vh; padding:2rem 1rem; overflow-x:hidden;
    }
    body::before {
      content:''; position:fixed; inset:0;
      background-image: linear-gradient(var(--border) 1px,transparent 1px),
                        linear-gradient(90deg,var(--border) 1px,transparent 1px);
      background-size:40px 40px; opacity:.3; pointer-events:none; z-index:0;
    }
    .container { position:relative; z-index:1; width:100%; max-width:560px; display:flex; flex-direction:column; gap:2rem; }
    header { text-align:left; }
    .tag { font-family:'Space Mono',monospace; font-size:.7rem; letter-spacing:.2em; color:var(--accent); text-transform:uppercase; margin-bottom:.5rem; }
    h1 { font-size:clamp(2rem,6vw,3rem); font-weight:700; letter-spacing:-.03em; line-height:1.1; color:var(--text); }
    h1 span { color:var(--accent); }
    .subtitle { margin-top:.5rem; font-size:.85rem; color:var(--muted); font-weight:300; }
    .card { background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:2rem; display:flex; flex-direction:column; gap:1.4rem; }
    .input-group { display:flex; flex-direction:column; gap:.5rem; }
    label { font-family:'Space Mono',monospace; font-size:.72rem; letter-spacing:.15em; color:var(--muted); text-transform:uppercase; }
    textarea {
      background:var(--bg); border:1px solid var(--border); border-radius:10px;
      color:var(--text); font-family:'Noto Sans TC',sans-serif; font-size:1rem;
      line-height:1.6; padding:1rem 1.2rem; resize:none; height:130px;
      transition:border-color .2s,box-shadow .2s; outline:none; width:100%;
    }
    textarea::placeholder { color:var(--muted); }
    textarea:focus { border-color:var(--accent); box-shadow:0 0 0 3px var(--glow); }
    .options-row { display:flex; gap:1rem; flex-wrap:wrap; }
    .option-group { display:flex; flex-direction:column; gap:.4rem; flex:1; min-width:120px; }
    select {
      background:var(--bg); border:1px solid var(--border); border-radius:8px;
      color:var(--text); font-family:'Noto Sans TC',sans-serif; font-size:.9rem;
      padding:.55rem .9rem; outline:none; cursor:pointer; transition:border-color .2s;
    }
    select:focus { border-color:var(--accent); }
    .btn {
      background:var(--accent); border:none; border-radius:10px; color:#0a0a0f;
      cursor:pointer; font-family:'Space Mono',monospace; font-size:.88rem;
      font-weight:700; letter-spacing:.08em; padding:.85rem 1.6rem;
      transition:transform .15s,box-shadow .15s,background .15s;
      text-transform:uppercase; width:100%;
    }
    .btn:hover { background:#a0ffb0; box-shadow:0 0 20px var(--glow); transform:translateY(-1px); }
    .btn:active { transform:translateY(0); }
    .error-banner {
      display:none; background:rgba(255,90,90,.1); border:1px solid rgba(255,90,90,.4);
      border-radius:8px; padding:.75rem 1rem; font-size:.82rem; color:#ff8f8f;
      font-family:'Space Mono',monospace; line-height:1.5; white-space:pre-line;
    }
    .error-banner.visible { display:block; }
    .qr-output { display:none; flex-direction:column; align-items:center; gap:1.4rem; }
    .qr-output.visible { display:flex; }
    .qr-frame {
      position:relative; padding:1.5rem; background:#fff;
      border-radius:12px; box-shadow:0 0 40px rgba(127,255,110,.12);
      animation:fadeIn .4s ease;
    }
    .qr-frame canvas { display:block; }
    .qr-frame::before,.qr-frame::after { content:''; position:absolute; width:20px; height:20px; border-color:var(--accent); border-style:solid; }
    .qr-frame::before { top:-4px; left:-4px; border-width:3px 0 0 3px; border-radius:4px 0 0 0; }
    .qr-frame::after  { bottom:-4px; right:-4px; border-width:0 3px 3px 0; border-radius:0 0 4px 0; }
    .qr-info { font-family:'Space Mono',monospace; font-size:.7rem; color:var(--muted); letter-spacing:.06em; text-align:center; }
    .qr-actions { display:flex; gap:.8rem; width:100%; }
    .btn-secondary {
      background:transparent; border:1px solid var(--border); border-radius:10px;
      color:var(--text); cursor:pointer; font-family:'Space Mono',monospace;
      font-size:.78rem; font-weight:700; letter-spacing:.08em;
      padding:.7rem 1rem; flex:1; transition:border-color .2s,color .2s,background .2s;
      text-transform:uppercase;
    }
    .btn-secondary:hover { border-color:var(--accent2); color:var(--accent2); background:rgba(61,255,208,.05); }
    .char-count { font-family:'Space Mono',monospace; font-size:.72rem; color:var(--muted); text-align:right; letter-spacing:.05em; }
    .char-count.warn { color:#ffb347; }
    @keyframes fadeIn { from{opacity:0;transform:scale(.96) translateY(8px)} to{opacity:1;transform:scale(1) translateY(0)} }
    footer { text-align:center; font-size:.72rem; color:var(--muted); font-family:'Space Mono',monospace; letter-spacing:.05em; }
  </style>
</head>
<body>
<div class="container">
  <header>
    <div class="tag">// Tool_01</div>
    <h1>QR<span>編碼器</span></h1>
    <p class="subtitle">支援中文、特殊符號【】「」、網址，完整 UTF-8 編碼</p>
  </header>

  <div class="card">
    <div class="input-group">
      <label for="text-input">輸入內容</label>
      <textarea id="text-input" placeholder="支援中文、日文、特殊符號、網址…&#10;例：【淘宝】7天无理由退货 https://..."></textarea>
      <div class="char-count" id="char-count">0 字元</div>
    </div>
    <div class="options-row">
      <div class="option-group">
        <label for="size-select">尺寸</label>
        <select id="size-select">
          <option value="4">小（~200px）</option>
          <option value="6" selected>中（~300px）</option>
          <option value="8">大（~400px）</option>
          <option value="10">超大（~500px）</option>
        </select>
      </div>
      <div class="option-group">
        <label for="ecl-select">容錯等級</label>
        <select id="ecl-select">
          <option value="L">L — 低 7%</option>
          <option value="M" selected>M — 中 15%</option>
          <option value="Q">Q — 高 25%</option>
          <option value="H">H — 最高 30%</option>
        </select>
      </div>
    </div>
    <div class="error-banner" id="error-banner"></div>
    <button class="btn" onclick="generateQR()">▶ 產生 QR Code</button>
  </div>

  <div class="card qr-output" id="qr-output">
    <div class="qr-frame"><canvas id="qr-canvas"></canvas></div>
    <div class="qr-info" id="qr-info"></div>
    <div class="qr-actions">
      <button class="btn-secondary" onclick="downloadQR()">↓ 下載 PNG</button>
      <button class="btn-secondary" id="copy-btn" onclick="copyQR()">⎘ 複製圖片</button>
      <button class="btn-secondary" onclick="resetAll()">✕ 清除</button>
    </div>
  </div>

  <footer>使用 qrcode-generator · 完整 UTF-8 支援 · 純本地運算</footer>
</div>

<script>
  const inputEl     = document.getElementById('text-input');
  const charCount   = document.getElementById('char-count');
  const errorBanner = document.getElementById('error-banner');
  const qrOutput    = document.getElementById('qr-output');
  const qrCanvas    = document.getElementById('qr-canvas');
  const qrInfo      = document.getElementById('qr-info');

  inputEl.addEventListener('input', () => {
    const len = inputEl.value.length;
    charCount.textContent = `${len} 字元`;
    charCount.classList.toggle('warn', len > 800);
    hideError();
  });
  inputEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) generateQR();
  });

  function showError(msg) { errorBanner.textContent = msg; errorBanner.classList.add('visible'); }
  function hideError()    { errorBanner.classList.remove('visible'); }

  function generateQR() {
    hideError();
    const text = inputEl.value.trim();
    if (!text) {
      inputEl.focus();
      inputEl.style.borderColor = '#ff6b6b';
      setTimeout(() => inputEl.style.borderColor = '', 800);
      return;
    }

    const cellSize = parseInt(document.getElementById('size-select').value);
    const ecl      = document.getElementById('ecl-select').value;

    try {
      // typeNumber 0 = 自動選版本；Byte mode 支援任意 UTF-8 內容
      const qr = qrcode(0, ecl);
      qr.addData(text, 'Byte');
      qr.make();

      const moduleCount = qr.getModuleCount();
      const margin = 4;
      const total  = moduleCount + margin * 2;
      const side   = total * cellSize;

      qrCanvas.width  = side;
      qrCanvas.height = side;
      const ctx = qrCanvas.getContext('2d');

      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, side, side);
      ctx.fillStyle = '#000000';

      for (let row = 0; row < moduleCount; row++) {
        for (let col = 0; col < moduleCount; col++) {
          if (qr.isDark(row, col)) {
            ctx.fillRect((col + margin) * cellSize, (row + margin) * cellSize, cellSize, cellSize);
          }
        }
      }

      qrInfo.textContent = `版本 ${qr.getTypeNumber()} · ${moduleCount}×${moduleCount} 模組 · 輸出 ${side}×${side} px`;
      qrOutput.classList.add('visible');
      qrOutput.scrollIntoView({ behavior:'smooth', block:'nearest' });

    } catch (err) {
      showError(`⚠ 產生失敗：${err.message || err}\n\n提示：文字過長時請嘗試降低容錯等級（選 L），或縮短內容。`);
      qrOutput.classList.remove('visible');
    }
  }

  function downloadQR() {
    const a = document.createElement('a');
    a.download = 'qrcode.png';
    a.href = qrCanvas.toDataURL('image/png');
    a.click();
  }

  async function copyQR() {
    const btn = document.getElementById('copy-btn');
    try {
      await new Promise((res, rej) =>
        qrCanvas.toBlob(async b => {
          try { await navigator.clipboard.write([new ClipboardItem({'image/png': b})]); res(); }
          catch(e) { rej(e); }
        })
      );
      const orig = btn.textContent;
      btn.textContent = '✓ 已複製！';
      setTimeout(() => btn.textContent = orig, 1800);
    } catch { alert('此瀏覽器不支援複製圖片，請改用下載。'); }
  }

  function resetAll() {
    inputEl.value = '';
    charCount.textContent = '0 字元';
    hideError();
    qrOutput.classList.remove('visible');
    qrCanvas.getContext('2d').clearRect(0, 0, qrCanvas.width, qrCanvas.height);
    inputEl.focus();
  }
</script>
</body>
</html>
